spring.application.name=maintenance
server.port=8080

# Default to in-memory H2 so app starts out of the box.
# Set DB_URL/DB_USERNAME/DB_PASSWORD env vars to use PostgreSQL.
spring.datasource.url=${DB_URL:jdbc:h2:mem:maintenance_db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

security.jwt.secret=change-this-to-a-long-random-secret-key
security.jwt.expiration-ms=86400000

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
spring.h2.console.enabled=true
